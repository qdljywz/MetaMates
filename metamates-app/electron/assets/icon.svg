<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="mGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e1e2e" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with shadow -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Inner glow ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- M letter - stylized -->
  <g filter="url(#glow)">
    <path d="M70 180 L70 90 L100 90 L128 140 L156 90 L186 90 L186 180 L160 180 L160 120 L128 170 L96 120 L96 180 Z" 
          fill="url(#mGradient)"/>
  </g>
  
  <!-- Accent elements -->
  <circle cx="190" cy="66" r="12" fill="#fcd34d"/>
  <circle cx="190" cy="66" r="6" fill="#fef3c7"/>
  
  <!-- Small connection dots -->
  <circle cx="70" cy="90" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="186" cy="90" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="128" cy="170" r="4" fill="rgba(255,255,255,0.6)"/>
</svg>