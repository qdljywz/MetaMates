<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Metamates Mobile</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f12;
      color: #e5e5e5;
      min-height: 100vh;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #18181b;
      border-bottom: 1px solid #27272a;
      padding: 12px 16px;
    }
    h1 { font-size: 16px; margin: 0 0 8px; }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #3f3f46;
      background: #09090b;
      color: #a1a1aa;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
    }
    .tab.active {
      border-color: #ff8c28;
      color: #ff8c28;
      background: rgba(255, 140, 40, 0.1);
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #3f3f46;
      background: #09090b;
      color: #fafafa;
      font-size: 16px;
    }
    textarea { min-height: 120px; resize: vertical; font-family: inherit; }
    main { padding: 12px 16px 24px; }
    .note-item {
      padding: 12px;
      border-radius: 10px;
      background: #18181b;
      border: 1px solid #27272a;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .note-item:active { background: #27272a; }
    .note-title { font-weight: 600; font-size: 15px; }
    .note-path { font-size: 12px; color: #a1a1aa; margin-top: 4px; }
    .viewer {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 15px;
      padding-bottom: 40px;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 12px;
      color: #ff8c28;
      cursor: pointer;
      font-size: 14px;
    }
    .empty { text-align: center; color: #71717a; padding: 40px 16px; }
    .badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      color: #a1a1aa;
      background: #27272a;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .capture-form label {
      display: block;
      font-size: 12px;
      color: #a1a1aa;
      margin: 12px 0 6px;
    }
    .capture-form label:first-child { margin-top: 0; }
    button.primary {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #ff8c28;
      color: #111;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary:disabled { opacity: 0.5; }
    .msg { margin-top: 12px; font-size: 13px; text-align: center; }
    .msg.ok { color: #22c55e; }
    .msg.err { color: #ef4444; }
    #search-wrap { margin-top: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Metamates</h1>
    <div class="tabs">
      <button type="button" class="tab active" data-tab="browse">浏览</button>
      <button type="button" class="tab" data-tab="capture">剪藏</button>
    </div>
    <div id="search-wrap">
      <input id="search" type="search" placeholder="搜索笔记..." autocomplete="off" />
    </div>
    <div class="badge" id="status">加载中...</div>
  </header>
  <main id="app"></main>
  <script>
    const app = document.getElementById('app')
    const searchInput = document.getElementById('search')
    const searchWrap = document.getElementById('search-wrap')
    const statusEl = document.getElementById('status')
    let files = []
    let view = 'list'
    let activeTab = 'browse'

    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab
        document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab))
        searchWrap.classList.toggle('hidden', activeTab !== 'browse')
        if (activeTab === 'capture') renderCapture()
        else if (view === 'list') renderList(filterFiles(searchInput.value))
      })
    })

    async function api(path, options) {
      const res = await fetch(path, options)
      if (!res.ok) throw new Error(await res.text())
      return res.json()
    }

    function renderList(items) {
      view = 'list'
      if (!items.length) {
        app.innerHTML = '<div class="empty">无匹配笔记</div>'
        return
      }
      app.innerHTML = items.map(f => `
        <div class="note-item" data-path="${encodeURIComponent(f.path)}">
          <div class="note-title">${f.name}</div>
          <div class="note-path">${f.path}</div>
        </div>
      `).join('')
      app.querySelectorAll('.note-item').forEach(el => {
        el.addEventListener('click', () => openNote(decodeURIComponent(el.dataset.path)))
      })
    }

    function renderCapture() {
      view = 'capture'
      app.innerHTML = `
        <form class="capture-form" id="capture-form">
          <label>标题（可选）</label>
          <input id="cap-title" type="text" placeholder="一句话标题" />
          <label>链接（可选）</label>
          <input id="cap-url" type="url" placeholder="https://..." />
          <label>内容</label>
          <textarea id="cap-text" placeholder="想法、摘录、待办..." required></textarea>
          <button type="submit" class="primary" id="cap-submit">保存到 Inbox</button>
          <div class="msg" id="cap-msg"></div>
        </form>
      `
      document.getElementById('capture-form').onsubmit = async (e) => {
        e.preventDefault()
        const text = document.getElementById('cap-text').value.trim()
        const title = document.getElementById('cap-title').value.trim()
        const url = document.getElementById('cap-url').value.trim()
        const msg = document.getElementById('cap-msg')
        const btn = document.getElementById('cap-submit')
        if (!text) return
        btn.disabled = true
        msg.className = 'msg'
        msg.textContent = '保存中...'
        try {
          const result = await api('/api/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, title: title || undefined, url: url || undefined }),
          })
          msg.className = 'msg ok'
          msg.textContent = '已保存: ' + (result.file || result.path)
          document.getElementById('cap-text').value = ''
          document.getElementById('cap-title').value = ''
          document.getElementById('cap-url').value = ''
        } catch (err) {
          msg.className = 'msg err'
          msg.textContent = '保存失败: ' + err.message
        } finally {
          btn.disabled = false
        }
      }
    }

    async function openNote(path) {
      view = 'note'
      searchWrap.classList.remove('hidden')
      app.innerHTML = '<div class="back-btn" id="back">← 返回列表</div><div class="viewer">加载中...</div>'
      document.getElementById('back').onclick = () => {
        activeTab = 'browse'
        document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === 'browse'))
        renderList(filterFiles(searchInput.value))
      }
      try {
        const data = await api(`/api/file?path=${encodeURIComponent(path)}`)
        app.querySelector('.viewer').textContent = data.content || ''
      } catch (e) {
        app.querySelector('.viewer').textContent = '读取失败: ' + e.message
      }
    }

    function filterFiles(q) {
      const term = (q || '').trim().toLowerCase()
      if (!term) return files
      return files.filter(f =>
        f.name.toLowerCase().includes(term) ||
        f.path.toLowerCase().includes(term)
      )
    }

    async function loadFiles() {
      try {
        const data = await api('/api/list?recursive=true')
        files = data.files || []
        statusEl.textContent = `${files.length} 篇笔记`
        if (activeTab === 'browse') renderList(files)
      } catch (e) {
        statusEl.textContent = '连接失败'
        app.innerHTML = '<div class="empty">无法连接 Vault API。请在桌面端启用 Vault API。</div>'
      }
    }

    let searchTimer
    searchInput.addEventListener('input', () => {
      if (activeTab !== 'browse') return
      clearTimeout(searchTimer)
      searchTimer = setTimeout(async () => {
        const q = searchInput.value.trim()
        if (!q) {
          renderList(files)
          return
        }
        try {
          const data = await api(`/api/search?q=${encodeURIComponent(q)}&limit=50`)
          const results = (data.results || []).map(r => ({ name: r.name, path: r.path }))
          renderList(results)
        } catch {
          renderList(filterFiles(q))
        }
      }, 300)
    })

    loadFiles()
  </script>
</body>
</html>
