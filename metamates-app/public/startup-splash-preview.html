<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetaMates 启动动画预览</title>
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; }
    .startup-splash {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse 80% 60% at 50% 45%, #1f1f24 0%, #18181b 55%, #0f0f12 100%);
    }
    .startup-splash__frame {
      position: absolute;
      inset: 20px;
      pointer-events: none;
      border-radius: 12px;
    }
    .startup-splash__frame-dot {
      position: absolute;
      width: 7px;
      height: 7px;
      margin: -3.5px 0 0 -3.5px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px 2px rgba(255, 140, 40, 0.95), 0 0 18px 6px rgba(56, 189, 248, 0.55);
      animation: startup-border-walk 3.2s linear infinite;
    }
    @keyframes startup-border-walk {
      0% { top: 0; left: 0; }
      25% { top: 0; left: 100%; }
      50% { top: 100%; left: 100%; }
      75% { top: 100%; left: 0; }
      100% { top: 0; left: 0; }
    }
    .startup-splash__frame-glow {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 40px rgba(255, 122, 0, 0.03);
    }
    .startup-splash__logo-stage {
      position: relative;
      width: min(168px, 42vw);
      height: min(168px, 42vw);
      flex-shrink: 0;
    }
    .startup-splash__svg { width: 100%; height: 100%; overflow: visible; }
    .startup-splash__trace {
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#startup-glow);
      stroke-dasharray: 613;
      stroke-dashoffset: 613;
      animation: startup-trace-draw 2.8s ease-in-out infinite;
    }
    @keyframes startup-trace-draw {
      0% { stroke-dashoffset: 613; opacity: 0.35; }
      45% { stroke-dashoffset: 0; opacity: 1; }
      70% { stroke-dashoffset: 0; opacity: 0.85; }
      100% { stroke-dashoffset: -40; opacity: 0.2; }
    }
    .startup-splash__logo-img {
      position: absolute;
      inset: 8%;
      width: 84%;
      height: 84%;
      margin: auto;
      object-fit: contain;
      opacity: 0;
      transform: scale(0.92);
      animation: startup-logo-reveal 2.8s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.45));
    }
    @keyframes startup-logo-reveal {
      0%, 38% { opacity: 0; transform: scale(0.92); }
      52%, 78% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.85; transform: scale(1); }
    }
    .startup-splash__trail-dot { filter: url(#startup-dot-glow); }
    .startup-splash__brand {
      margin: 28px 0 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(250, 250, 250, 0.88);
      animation: startup-brand-pulse 2.8s ease-in-out infinite;
    }
    .startup-splash__slogan {
      margin: 8px 0 0;
      max-width: min(320px, 88vw);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.5;
      text-align: center;
      color: rgba(212, 212, 216, 0.82);
      letter-spacing: 0.04em;
      animation: startup-brand-pulse 2.8s ease-in-out infinite;
    }
    .startup-splash__hint {
      margin: 10px 0 0;
      font-size: 12px;
      color: rgba(161, 161, 170, 0.85);
      letter-spacing: 0.02em;
    }
    @keyframes startup-brand-pulse {
      0%, 40% { opacity: 0.45; }
      55%, 100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="startup-splash" role="status" aria-live="polite" aria-busy="true">
    <div class="startup-splash__frame" aria-hidden="true">
      <div class="startup-splash__frame-glow"></div>
      <div class="startup-splash__frame-dot"></div>
    </div>
    <div class="startup-splash__logo-stage">
      <svg class="startup-splash__svg" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="startup-gradient-stroke" x1="0" y1="0" x2="128" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffb347" />
            <stop offset="45%" stop-color="#e85d4c" />
            <stop offset="55%" stop-color="#5eead4" />
            <stop offset="100%" stop-color="#1e3a8a" />
          </linearGradient>
          <filter id="startup-glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <filter id="startup-dot-glow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
        </defs>
        <path class="startup-splash__trace" pathLength="613" stroke="url(#startup-gradient-stroke)" d="M 119 5.3 L 123 5.3 L 124 6.8 L 124 101.3 L 123 102.8 L 103.5 122.8 L 100.5 122.8 L 100.5 99.3 L 99.5 98.8 L 76 122.8 L 73.5 122.8 L 73.5 68.8 L 73 68.3 L 66 74.3 L 64.5 74.8 L 55.5 67.3 L 55 67.8 L 55 122.8 L 20 122.8 L 4 105.3 L 4 10.8 L 4.5 9.8 L 5.5 8.8 L 10 7.3 L 13 7.3 L 65.5 36.8 L 104.5 13.3 L 118.5 5.8" />
        <circle class="startup-splash__trail-dot" r="3.5" fill="#fff">
          <animateMotion dur="2.8s" repeatCount="indefinite"
            path="M 119 5.3 L 123 5.3 L 124 6.8 L 124 101.3 L 123 102.8 L 103.5 122.8 L 100.5 122.8 L 100.5 99.3 L 99.5 98.8 L 76 122.8 L 73.5 122.8 L 73.5 68.8 L 73 68.3 L 66 74.3 L 64.5 74.8 L 55.5 67.3 L 55 67.8 L 55 122.8 L 20 122.8 L 4 105.3 L 4 10.8 L 4.5 9.8 L 5.5 8.8 L 10 7.3 L 13 7.3 L 65.5 36.8 L 104.5 13.3 L 118.5 5.8 Z"
            keyPoints="0;1" keyTimes="0;1" calcMode="linear" />
        </circle>
      </svg>
      <img class="startup-splash__logo-img" src="./logo.png" alt="" draggable="false" />
    </div>
    <p class="startup-splash__brand">MetaMates</p>
    <p class="startup-splash__slogan">私人灵感仓库 + 思考引擎</p>
    <p class="startup-splash__hint">正在启动…</p>
  </div>
</body>
</html>
