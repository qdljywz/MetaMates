appId: com.metamates.app
productName: MetaMates
copyright: Copyright © 2026 MetaMates Team

# Keep only UI locales we ship (drops ~30–40 MB of Chromium .pak files on Windows).
electronLanguages:
  - en-US
  - zh-CN

# electron-builder runs @electron/rebuild; we also rebuild explicitly before pack.
npmRebuild: true

directories:
  # Single output folder for all builds (local, CI, overnight). Do not override with -c.directories.output elsewhere.
  output: release
  buildResources: build

# dependencies = main-process runtime only (SQLite, document extract).
# UI libraries are devDependencies and ship inside dist/ via Vite.
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - "!node_modules/@ant-design/**"
  - "!node_modules/antd/**"
  - "!node_modules/react/**"
  - "!node_modules/react-dom/**"
  - "!node_modules/three/**"
  - "!node_modules/codemirror/**"
  - "!node_modules/@codemirror/**"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,__pycache__,thumbs.db,.gitignore,.gitattributes}"
  - "!**/{test,__tests__,tests,powered-test,example,examples,demo,demos}"
  - "!**/*.map"

asarUnpack:
  - "**/*.node"
  - "**/node_modules/better-sqlite3/**"

extraMetadata:
  main: dist-electron/main.cjs

extraResources:
  - from: inits
    to: inits
    filter:
      - "**/*"
  - from: build
    to: build
    filter:
      - icon.ico
      - icon.icns
      - icon.png
  - from: scripts/vault-mcp-bridge.mjs
    to: scripts/vault-mcp-bridge.mjs
  - from: scripts/ollama-acp-bridge.mjs
    to: scripts/ollama-acp-bridge.mjs
  - from: docs/user-manual.html
    to: docs/user-manual.html
  - from: plugins
    to: plugins
    filter:
      - "**/manifest.json"
  - from: build/plugin-zips
    to: plugin-zips
    filter:
      - "*.zip"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: MetaMates-${version}-win-${arch}.${ext}
  legalTrademarks: MetaMates

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MetaMates
  uninstallDisplayName: MetaMates
  runAfterFinish: true
  license: LICENSE
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  artifactName: MetaMates-${version}-mac-${arch}.${ext}
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: MetaMates uses the microphone for voice input in the chat panel.
    NSCameraUsageDescription: MetaMates does not use the camera.

dmg:
  title: MetaMates ${version}
  icon: build/icon.icns
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
  icon: build/icon.png
  artifactName: MetaMates-${version}-linux-${arch}.${ext}

publish:
  provider: github
  owner: qdljywz
  repo: MetaMates
  releaseType: release
