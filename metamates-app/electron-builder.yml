appId: com.metamates.app
productName: Metamates
copyright: Copyright © 2026 Metamates

npmRebuild: false

directories:
  output: dist-release-v8
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - inits/**/*

extraMetadata:
  main: dist-electron/main.cjs

extraResources:
  - from: inits
    to: inits
  - from: build
    to: build

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  license: LICENSE
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  icon: build/icon.icns

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
  icon: build/icon.png

publish: null