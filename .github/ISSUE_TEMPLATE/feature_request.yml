name: Feature request
description: Suggest an idea for Metamates
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional

  - type: checkboxes
    id: scope
    attributes:
      label: Scope alignment
      options:
        - label: This fits local-first / vault-centric design (see docs/PERSONAL_SCOPE.md)
          required: true
