name: Bug report
description: Report a reproducible bug in Metamates
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report. Please avoid pasting API keys or personal vault contents.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux (AppImage)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Metamates version
      placeholder: "0.1.0 or git commit hash"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Metamates
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Optional. Redact paths if they contain personal information.
