name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'metamates-app/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'metamates-app/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: metamates-app

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: metamates-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Open-source hygiene
        run: npm run check:opensource

      - name: Typecheck, unit tests, functional checks
        run: npm run verify:round

      - name: UX guardrails (unit)
        run: npm run test:ux-guardrails

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: metamates-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run smoke e2e
        run: npm run test:e2e:smoke
