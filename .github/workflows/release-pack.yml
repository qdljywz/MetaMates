name: Release Pack

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: win
        type: choice
        options:
          - win
          - mac
          - all
      publish_release:
        description: Create GitHub Release and upload installer + latest.yml (required for auto-update)
        required: false
        default: false
        type: boolean

defaults:
  run:
    working-directory: metamates-app

jobs:
  pack-win:
    if: inputs.platform == 'win' || inputs.platform == 'all'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: metamates-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Windows installer
        run: npm run electron:build:win
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack document-import extension
        run: npm run plugin:document-import:pack

      - name: Download Whisper model and pack offline-speech extension
        run: npm run whisper:download-model && npm run plugin:offline-speech:pack

      - name: Fresh-user session DB smoke
        run: npm run verify:fresh-user

      - name: Verify offline-speech plugin smoke
        run: npm run verify:offline-speech-dev

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metamates-win
          path: |
            metamates-app/release/*.exe
            metamates-app/release/*.blockmap
            metamates-app/release/latest.yml
            metamates-app/release/MetaMates-document-import-*.zip
            metamates-app/release/MetaMates-offline-speech-*.zip
          if-no-files-found: error

      - name: Publish GitHub Release (Windows)
        if: inputs.publish_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: MetaMates v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
          files: |
            metamates-app/release/MetaMates-${{ steps.pkg.outputs.version }}-win-x64.exe
            metamates-app/release/MetaMates-${{ steps.pkg.outputs.version }}-win-x64.exe.blockmap
            metamates-app/release/latest.yml
            metamates-app/release/MetaMates-document-import-${{ steps.pkg.outputs.version }}-win-x64.zip
            metamates-app/release/MetaMates-offline-speech-${{ steps.pkg.outputs.version }}-win-x64.zip

  pack-mac:
    if: inputs.platform == 'mac' || inputs.platform == 'all'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: metamates-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build macOS dmg
        run: npm run electron:build:mac
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metamates-mac
          path: |
            metamates-app/release/*.dmg
            metamates-app/release/*.zip
            metamates-app/release/*.blockmap
            metamates-app/release/latest-mac.yml
          if-no-files-found: error

      - name: Publish GitHub Release (macOS)
        if: inputs.publish_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: MetaMates v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
          files: |
            metamates-app/release/MetaMates-${{ steps.pkg.outputs.version }}-mac-*.dmg
            metamates-app/release/MetaMates-${{ steps.pkg.outputs.version }}-mac-*.zip
            metamates-app/release/latest-mac.yml
